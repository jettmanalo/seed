<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manifest Inspector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .code-block {
            font-family: 'Courier New', Courier, monospace;
            background: #1e293b;
            color: #e2e8f0;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            display: block;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 0.25rem;
        }
        .tab-active {
            border-bottom: 3px solid #4f46e5;
            color: #4f46e5;
            font-weight: 700;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div class="max-w-7xl mx-auto py-8 px-6">
        <header class="mb-8">
            <h1 class="text-3xl font-extrabold text-gray-800">Manifest Gallery</h1>
            <p class="text-gray-500">Browsing entries from <code class="bg-gray-200 px-1 rounded">manifest.json</code></p>
        </header>

        <nav class="flex flex-wrap gap-2 border-b border-gray-200 mb-8" id="tab-container">
            <button onclick="setFilter('all')" class="tab-btn px-6 py-3 transition-all hover:bg-gray-100" id="tab-all">All</button>
            <button onclick="setFilter('layering')" class="tab-btn px-6 py-3 transition-all hover:bg-gray-100" id="tab-layering">Layering</button>
            <button onclick="setFilter('layout')" class="tab-btn px-6 py-3 transition-all hover:bg-gray-100" id="tab-layout">Layout</button>
            <button onclick="setFilter('spacing')" class="tab-btn px-6 py-3 transition-all hover:bg-gray-100" id="tab-spacing">Spacing</button>
            <button onclick="setFilter('typography')" class="tab-btn px-6 py-3 transition-all hover:bg-gray-100" id="tab-typography">Typography</button>
            <button onclick="setFilter('visibility')" class="tab-btn px-6 py-3 transition-all hover:bg-gray-100" id="tab-visibility">Visibility</button>
        </nav>

        <div id="entries-list" class="space-y-8">
            <div class="py-20 text-center text-gray-400">Loading manifest data...</div>
        </div>

        <div class="flex flex-col sm:flex-row justify-between items-center mt-12 pt-8 border-t border-gray-200 gap-4 pb-12">
            <p id="page-info" class="text-sm text-gray-600 font-medium order-2 sm:order-1">Showing 0 of 0 entries</p>
            <div class="flex gap-2 order-1 sm:order-2">
                <button id="prev-btn" onclick="changePage(-1)" class="px-5 py-2 bg-white border border-gray-300 rounded-lg shadow-sm hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed transition">Previous</button>
                <button id="next-btn" onclick="changePage(1)" class="px-5 py-2 bg-white border border-gray-300 rounded-lg shadow-sm hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed transition">Next</button>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        let currentFilter = 'all';
        let currentPage = 1;
        const itemsPerPage = 25;

        // Fetch the external JSON file
        async function loadManifest() {
            try {
                const response = await fetch('typography_v1.json');
                if (!response.ok) throw new Error('Failed to load manifest.json');
                rawData = await response.json();
                render();
            } catch (err) {
                document.getElementById('entries-list').innerHTML = `
                    <div class="bg-red-50 p-6 rounded-lg text-red-700 border border-red-200">
                        <strong>Error:</strong> ${err.message}. Make sure manifest.json is in the same folder and you are using a local server.
                    </div>`;
            }
        }

        function render() {
            const listContainer = document.getElementById('entries-list');

            // 1. Filter Logic
            const filteredData = rawData.filter(item => {
                if (currentFilter === 'all') return true;
                return item.id.toLowerCase().startsWith(currentFilter);
            });

            // 2. Pagination Logic
            const totalPages = Math.ceil(filteredData.length / itemsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredData.slice(start, end);

            // 3. Generate HTML
            if (pageItems.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-10 text-gray-400">No entries found for "${currentFilter}"</div>`;
            } else {
                listContainer.innerHTML = pageItems.map(item => `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col lg:flex-row">
                        <div class="flex-shrink-0 bg-gray-100" style="width: 224px; height: 224px;">
                            <img src="03_screenshots/${item.image_anchor}"
                                 alt="${item.id}"
                                 class="w-full h-full object-cover"
                                 onerror="this.src='https://placehold.co/224x224/e2e8f0/64748b?text=Missing+Image'">
                        </div>

                        <div class="p-6 flex-grow flex flex-col">
                            <div class="flex justify-between items-start mb-4 border-b pb-3 border-gray-50">
                                <div>
                                    <h2 class="text-lg font-bold text-gray-900 leading-tight">${item.id}</h2>
                                    <span class="inline-block mt-1 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wider bg-indigo-100 text-indigo-700 rounded">
                                        ${item.status}
                                    </span>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3 text-sm">
                                <div>
                                    <p class="mb-2"><span class="font-bold text-gray-500 uppercase text-[10px] block mb-1">Critical</span> <span class="text-red-600 font-medium">${item.text_anchor.critical}</span></p>
                                    <p class="mb-2"><span class="font-bold text-gray-500 uppercase text-[10px] block mb-1">Frustrated</span> <span class="italic text-gray-600">"${item.text_anchor.frustrated}"</span></p>
                                    <p class="mb-2"><span class="font-bold text-gray-500 uppercase text-[10px] block mb-1">Concise</span> ${item.text_anchor.concise}</p>
                                </div>
                                <div>
                                    <p class="mb-2"><span class="font-bold text-gray-500 uppercase text-[10px] block mb-1">Descriptive</span> ${item.text_anchor.descriptive}</p>
                                    <p class="mb-2"><span class="font-bold text-gray-500 uppercase text-[10px] block mb-1">Comparative</span> <span class="text-blue-600">${item.text_anchor.comparative}</span></p>
                                </div>
                            </div>

                            <div class="mt-4 pt-4 border-t border-gray-50 grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-bold text-green-600 uppercase">Positive Node</label>
                                    <code class="code-block border-l-4 border-green-500">${escapeHtml(item.positive_node)}</code>
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-red-400 uppercase">Negative Node</label>
                                    <code class="code-block border-l-4 border-red-500">${escapeHtml(item.negative_node)}</code>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // 4. UI Updates
            document.getElementById('page-info').innerText = `Showing page ${currentPage} of ${totalPages} (${filteredData.length} entries)`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage === totalPages;

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById(`tab-${currentFilter}`).classList.add('tab-active');
        }

        function setFilter(filter) {
            currentFilter = filter;
            currentPage = 1;
            render();
        }

        function changePage(step) {
            currentPage += step;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize on load
        loadManifest();
    </script>
</body>
</html>
